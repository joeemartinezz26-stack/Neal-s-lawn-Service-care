name: Deploy Jarvis Life OS

on:
  push:
    branches: ["main"]
    paths:
      - "jarvis-life-os/**"
      - ".github/workflows/jarvis-life-os-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Jarvis site
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./jarvis-life-os
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
