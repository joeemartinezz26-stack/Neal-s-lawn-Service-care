<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#102a43">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jarvis">
<title>Jarvis</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f7fa;color:#243b53;display:grid;place-items:center;min-height:100vh}main{text-align:center;padding:24px}.spinner{width:42px;height:42px;border:4px solid #d9e2ec;border-top-color:#168aad;border-radius:50%;margin:0 auto 16px;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<main><div class="spinner"></div><strong>Opening Jarvis…</strong><p>Loading your private iPhone dashboard.</p></main>
<script>
(async()=>{
  try{
    const files=["part01.txt","part02.txt","part03.txt","part04.txt","part05.txt","part06.txt"];
    const chunks=await Promise.all(files.map(f=>fetch("./"+f,{cache:"no-store"}).then(r=>{
      if(!r.ok) throw new Error("Missing "+f);
      return r.text();
    })));
    const bin=atob(chunks.join(""));
    const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
    const html=new TextDecoder("utf-8").decode(bytes);
    document.open();document.write(html);document.close();
  }catch(error){
    document.body.innerHTML="<main><strong>Jarvis could not load.</strong><p>"+error.message+"</p></main>";
  }
})();
</script>
</body>
</html>
